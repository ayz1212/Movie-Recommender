<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Movie Recommender</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08080f;--surf:#0f0f1c;--card:#13131f;--border:#1e1e30;
  --gold:#e8b84b;--gold-dim:#a07830;--gold-glow:rgba(232,184,75,.13);
  --text:#ece6d8;--text-dim:#888299;--text-muted:#35304a;
  --red:#e05252;--green:#4cba7a;--radius:10px;
  --accent:var(--gold);--accent-dim:var(--gold-dim);--accent-glow:var(--gold-glow);
  --sw:300px;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;font-size:16px;min-height:100vh;overflow-x:hidden}
button{font-family:'Outfit',sans-serif;cursor:pointer}
input{font-family:'Outfit',sans-serif}

.layout{display:flex;min-height:100vh}

.sidebar{width:var(--sw);min-width:var(--sw);background:var(--surf);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;position:sticky;top:0;z-index:200;flex-shrink:0}
.logo-wrap{padding:18px 20px 12px;border-bottom:1px solid var(--border);text-align:center;flex-shrink:0}
.logo{font-family:'Bebas Neue',sans-serif;font-size:38px;color:var(--accent);letter-spacing:.06em;line-height:1}
.logo-sub{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--text-muted);margin-top:2px}

.chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
.chat-msgs{flex:1;overflow-y:auto;padding:12px 12px 6px;display:flex;flex-direction:column;gap:8px}
.chat-msgs::-webkit-scrollbar{width:3px}
.chat-msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.msg{padding:9px 13px;border-radius:12px;font-size:13px;line-height:1.5;max-width:96%}
.msg.bot{background:var(--accent-glow);border:1px solid var(--accent-dim);color:var(--text);align-self:flex-start;border-top-left-radius:3px}
.msg.user{background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--text-dim);align-self:flex-end;border-top-right-radius:3px;font-style:italic}

.chat-opts{padding:8px 10px;display:flex;flex-wrap:wrap;gap:5px;border-top:1px solid var(--border);background:var(--surf);max-height:200px;overflow-y:auto}
.chat-opts::-webkit-scrollbar{width:3px}
.chat-opts::-webkit-scrollbar-thumb{background:var(--border)}
.opt-btn{font-size:11.5px;padding:5px 10px;border-radius:20px;background:var(--bg);border:1px solid var(--border);color:var(--text-dim);transition:all .15s}
.opt-btn:hover,.opt-btn.sel{border-color:var(--accent);color:var(--accent);background:var(--accent-glow)}
.opt-btn.next-btn{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700;width:100%;margin-top:4px;padding:8px;font-size:13px}
.opt-btn.skip-btn{border-style:dashed;color:var(--text-muted);width:100%;margin-top:2px;font-size:11px}

.range-block{width:100%;padding:6px 0}
.range-block label{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-dim);display:block;margin-bottom:4px;letter-spacing:.06em}
.range-row{display:flex;align-items:center;gap:6px}
.range-row input[type=range]{flex:1;accent-color:var(--accent);height:4px}
.range-val{font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--accent);min-width:32px;text-align:center}
.range-inline{display:flex;align-items:center;gap:6px;width:100%}
.range-inline .range-side{flex:1;display:flex;flex-direction:column;gap:3px}
.range-sep{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);padding-top:14px}
.other-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;padding:7px 10px;outline:none;margin-top:6px}
.other-input:focus{border-color:var(--accent)}

.chat-input-row{display:flex;padding:8px 10px;border-top:1px solid var(--border);gap:6px;flex-shrink:0}
.chat-input-row input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;padding:8px 11px;outline:none;transition:border .2s}
.chat-input-row input:focus{border-color:var(--accent)}
.chat-input-row button{background:var(--accent);color:#000;border:none;border-radius:8px;padding:0 13px;font-weight:700;font-size:15px;transition:filter .2s}
.chat-input-row button:hover{filter:brightness(1.15)}

.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{padding:16px 22px 12px;border-bottom:1px solid var(--border);background:var(--surf);position:sticky;top:0;z-index:100}

.search-wrap{display:flex;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;background:var(--bg);transition:.2s}
.search-wrap:focus-within{border-color:var(--accent-dim);box-shadow:0 0 0 3px var(--accent-glow)}
#si{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:16px;padding:12px 16px;font-style:italic}
#sb{border:none;padding:0 20px;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:.12em;color:#08080f;background:var(--accent);flex-shrink:0}
#sb:hover{filter:brightness(1.15)}

.quick-pills{display:flex;gap:5px;flex-wrap:wrap;margin-top:11px}
.qpill{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.05em;color:var(--text-dim);border:1px solid var(--border);border-radius:30px;padding:4px 12px;transition:all .15s;background:transparent;white-space:nowrap}
.qpill:hover{border-color:var(--accent-dim);color:var(--accent);background:var(--accent-glow)}

.af-bar{display:flex;gap:6px;flex-wrap:wrap;padding:10px 22px 4px;min-height:0}
.af-bar:empty{padding:0}
.af-tag{display:flex;align-items:center;gap:5px;font-family:'DM Mono',monospace;font-size:10px;background:var(--accent-glow);border:1px solid var(--accent-dim);color:var(--accent);border-radius:4px;padding:3px 8px}
.af-tag button{background:none;border:none;color:var(--accent);font-size:12px;line-height:1;opacity:.6;padding:0}
.af-tag button:hover{opacity:1}
.clear-all{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);border:1px dashed var(--border);border-radius:4px;padding:3px 8px;background:transparent}
.clear-all:hover{color:var(--red);border-color:var(--red)}

.res-info{padding:6px 22px 2px;font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted);letter-spacing:.1em}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:14px;padding:14px 22px 26px}

.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:transform .2s,box-shadow .2s,border-color .2s}
.card:hover{transform:translateY(-4px);border-color:var(--accent-dim);box-shadow:0 10px 36px rgba(0,0,0,.55)}
.card-img{position:relative;width:100%;background:var(--surf);overflow:hidden;aspect-ratio:2/3}
.card-img img{width:100%;height:100%;object-fit:cover;display:block}
.card-img .no-img{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:34px;color:var(--text-muted)}
.card-rank{position:absolute;top:6px;left:6px;background:var(--accent);color:#000;font-family:'Bebas Neue',sans-serif;font-size:12px;padding:1px 7px;border-radius:4px}
.tv-badge{position:absolute;top:6px;right:6px;background:rgba(232,184,75,.85);color:#000;font-family:'DM Mono',monospace;font-size:8px;padding:2px 6px;border-radius:3px;font-weight:700;letter-spacing:.05em}
.card-body{padding:9px 11px 11px}
.card-title{font-size:13.5px;font-weight:600;line-height:1.35;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-meta{display:flex;justify-content:space-between;font-family:'DM Mono',monospace;font-size:10px;color:var(--text-dim)}
.card-meta .star{color:var(--accent)}
.card-gtags{display:flex;gap:3px;flex-wrap:wrap;margin-top:5px}
.gtag{font-family:'DM Mono',monospace;font-size:8px;text-transform:uppercase;color:var(--text-muted);border:1px solid var(--text-muted);border-radius:2px;padding:1px 4px;letter-spacing:.03em}

#loading{display:none;text-align:center;padding:80px 22px}
#loading.vis{display:block}
.spin{width:38px;height:38px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.load-txt{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.18em}

.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:1000;padding:20px;overflow-y:auto;backdrop-filter:blur(10px)}
.overlay.open{display:flex;align-items:flex-start;justify-content:center}
.modal{background:var(--card);border:1px solid var(--border);border-radius:14px;max-width:880px;width:100%;overflow:hidden;position:relative;margin:auto}
.modal-x{position:absolute;top:12px;right:12px;background:rgba(0,0,0,.7);border:1px solid var(--border);color:var(--text);width:32px;height:32px;border-radius:50%;font-size:14px;z-index:10;transition:all .2s}
.modal-x:hover{border-color:var(--red);color:var(--red)}
.modal-bd{width:100%;height:220px;object-fit:cover;display:block}
.modal-bd-fade{position:relative;overflow:hidden}
.modal-bd-fade::after{content:'';position:absolute;bottom:0;left:0;right:0;height:130px;background:linear-gradient(to bottom,transparent,var(--card))}
.modal-body{display:grid;grid-template-columns:150px 1fr;gap:20px;padding:18px 24px 26px}
.modal-poster img{width:100%;border-radius:8px;border:1px solid var(--border)}
.modal-poster .no-p{width:150px;height:220px;background:var(--surf);border-radius:8px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:42px}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:.05em;line-height:1;margin-bottom:4px}
.modal-sub{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted);letter-spacing:.1em;margin-bottom:8px}
.modal-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.mchip{font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;padding:3px 8px;border-radius:3px;border:1px solid var(--border);color:var(--text-dim);letter-spacing:.06em}
.mchip.ac{border-color:var(--accent-dim);color:var(--accent);background:var(--accent-glow)}
.mchip.tv{border-color:var(--gold-dim);color:var(--gold);background:var(--gold-glow)}
.modal-desc{font-size:14.5px;line-height:1.7;color:var(--text-dim)}
.modal-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(86px,1fr));gap:7px;margin-top:12px}
.mstat{background:var(--surf);border:1px solid var(--border);border-radius:8px;padding:7px 9px}
.mstat-lbl{font-family:'DM Mono',monospace;font-size:8px;text-transform:uppercase;letter-spacing:.12em;color:var(--text-muted);margin-bottom:3px}
.mstat-val{font-family:'Bebas Neue',sans-serif;font-size:19px;color:var(--accent);letter-spacing:.04em}
footer{padding:20px;text-align:center;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-muted);border-top:1px solid var(--border)}
.empty{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--text-muted);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase}

@media(max-width:720px){
  :root{--sw:0px}
  .sidebar{display:none}
  .modal-body{grid-template-columns:1fr}
  .modal-poster{display:none}
}
</style>
</head>
<body>
<div class="layout">

<aside class="sidebar">
  <div class="logo-wrap">
    <div class="logo">🎬 Movie Recommender</div>
    <div class="logo-sub">Discover your next favorite film</div>
  </div>
  <div class="chat-area">
    <div class="chat-msgs" id="chat-msgs"></div>
    <div class="chat-opts" id="chat-opts"></div>
    <div class="chat-input-row">
      <input id="chat-in" type="text" placeholder="Tell your mood / ask anything..." autocomplete="off"/>
      <button onclick="chatSend()">➤</button>
    </div>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="search-wrap">
      <input id="si" type="text" placeholder='Search by title — "Inception", "Breaking Bad"...' autocomplete="off"/>
      <button id="sb" onclick="doTitleSearch()">SEARCH</button>
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-top:8px">
      <span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);letter-spacing:.1em;white-space:nowrap">SHOW PER PAGE:</span>
      <div style="display:flex;gap:4px" id="limit-btns">
        <button class="qpill lbtn" data-v="12" onclick="setLimit(12)">12</button>
        <button class="qpill lbtn" data-v="24" onclick="setLimit(24)">24</button>
        <button class="qpill lbtn sel" data-v="48" onclick="setLimit(48)">48</button>
        <button class="qpill lbtn" data-v="100" onclick="setLimit(100)">100</button>
      </div>
    </div>
    <div class="quick-pills" id="qm">
      <button class="qpill" onclick="qsDiscover({min_rating:7.5,sort_by:'vote_average.desc',vote_count_min:500},'movie')">🏆 Top Films</button>
      <button class="qpill" onclick="qsDiscover({min_rating:7.5,sort_by:'vote_average.desc',vote_count_min:200},'tv')">📺 Top Series</button>
      <button class="qpill" onclick="qsDiscover({countries:['JP'],genres:['animation'],sort_by:'vote_average.desc',vote_count_min:50},'movie')">⛩ Anime</button>
      <button class="qpill" onclick="qsDiscover({countries:['KR'],sort_by:'vote_average.desc',vote_count_min:30},'movie')">🇰🇷 Korean Films</button>
      <button class="qpill" onclick="qsDiscover({countries:['IN'],sort_by:'vote_average.desc',vote_count_min:30},'movie')">🎭 Bollywood</button>
      <button class="qpill" onclick="qsDiscover({year_from:2025,sort_by:'popularity.desc'},'both')">✨ New 2025+</button>
      <button class="qpill" onclick="qsDiscover({sort_by:'popularity.desc'},'both')">🔥 Trending Now</button>
      <button class="qpill" onclick="qsDiscover({year_to:1979,min_rating:7.5,sort_by:'vote_average.desc',vote_count_min:200},'movie')">🎞 Classics</button>
      <button class="qpill" onclick="qsDiscover({genres:['horror'],sort_by:'vote_average.desc',vote_count_min:50},'movie')">👻 Horror</button>
      <button class="qpill" onclick="qsDiscover({genres:['action'],sort_by:'popularity.desc'},'movie')">💥 Action</button>
    </div>
  </div>

  <div class="af-bar" id="af-bar"></div>
  <div class="res-info" id="res-info" style="display:none"></div>
  <div id="loading"><div class="spin"></div><div class="load-txt">Searching...</div></div>
  <section id="res-sec" style="display:none">
    <div class="grid" id="grid"></div>
  </section>
  <footer>Movie Recommender © 2025 · Powered by TMDB</footer>
</div>
</div>

<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="modal">
    <button class="modal-x" onclick="closeModal()">✕</button>
    <div id="modal-body"></div>
  </div>
</div>

<script>
const API = 'http://localhost:5000/api';
let currentLimit = 48;

// ── Filter state
const MF = { genres:[], countries:[], ratingMin:null, ratingMax:null, yearFrom:null, yearTo:null, moodPrompt:'' };

function setLimit(n){
  currentLimit=n;
  document.querySelectorAll('.lbtn').forEach(b=>{
    b.classList.toggle('sel', parseInt(b.dataset.v)===n);
  });
}

function clearGrid(){
  document.getElementById('grid').innerHTML='';
  document.getElementById('res-sec').style.display='none';
  document.getElementById('res-info').style.display='none';
}

// ── Quick searches
function doTitleSearch(){
  const raw=document.getElementById('si').value.trim();
  if(!raw){doSearch();return;}
  doMovieSearch({title_search:true,query:raw,limit:currentLimit});
}

function qsDiscover(params, mediaType='movie'){
  document.getElementById('si').value='';
  resetFilters(false);
  const lim=params.limit||currentLimit;
  const body={query:'',limit:lim,media_type:mediaType,...params};
  if(params.genres)     body.genres     = params.genres;
  if(params.countries)  body.countries  = params.countries;
  if(params.min_rating) body.min_rating = params.min_rating;
  if(params.year_from)  body.year_from  = params.year_from;
  if(params.year_to)    body.year_to    = params.year_to;
  if(params.sort_by)    body.sort_by    = params.sort_by;
  doMovieSearch(body);
}

// ── Search
async function doSearch(){
  const body={
    query:'',
    countries:  MF.countries.length ? MF.countries : null,
    genres:     MF.genres.length    ? MF.genres    : null,
    min_rating: MF.ratingMin||null,
    max_rating: MF.ratingMax||null,
    year_from:  MF.yearFrom||null,
    year_to:    MF.yearTo||null,
    sort_by: MF.ratingMin ? 'vote_average.desc' : 'popularity.desc',
    limit: currentLimit,
  };
  await doMovieSearch(body);
}

async function doMovieSearch(body){
  showLoading(true);
  try{
    const res=await fetch(`${API}/search`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const d=await res.json();
    renderCards(d.results||[]);
    showInfo((d.results||[]).length,'titles');
    setTimeout(()=>startChat(true),300);
  }catch(e){console.error(e);showError();}
  finally{showLoading(false);}
}

function showLoading(on){
  document.getElementById('loading').classList.toggle('vis',on);
  if(on){document.getElementById('res-sec').style.display='none';document.getElementById('res-info').style.display='none';}
}
function showInfo(n,t){
  const el=document.getElementById('res-info');
  el.style.display='block';el.textContent=`${n} ${t} found`;
}
function showError(){
  document.getElementById('grid').innerHTML='<div class="empty">⚠ Server error — make sure app.py is running on port 5000</div>';
  document.getElementById('res-sec').style.display='block';
}

// ── Render cards
function renderCards(items){
  const grid=document.getElementById('grid');
  document.getElementById('res-sec').style.display='block';
  grid.innerHTML='';
  if(!items.length){grid.innerHTML='<div class="empty">Nothing found. Try different filters.</div>';return;}
  items.forEach((item,i)=>{
    const isTV=item.is_tv||item.type==='tv';
    const c=document.createElement('div');
    c.className='card';
    const imgH=item.poster
      ?`<img src="${item.poster}" loading="lazy" onerror="this.parentNode.innerHTML='<div class=\\'no-img\\'>🎬</div>'">`
      :`<div class="no-img">🎬</div>`;
    const star=item.rating>0?`★ ${item.rating.toFixed(1)}`:'';
    const rank=i<10?`<div class="card-rank">#${i+1}</div>`:'';
    const tvBadge=isTV?`<div class="tv-badge">TV</div>`:'';
    const tags=(item.genres||[]).slice(0,2).map(g=>`<span class="gtag">${g}</span>`).join('');
    c.innerHTML=`
      <div class="card-img">${imgH}${rank}${tvBadge}</div>
      <div class="card-body">
        <div class="card-title">${item.title}</div>
        <div class="card-meta"><span class="star">${star}</span><span>${item.year||''}</span></div>
        <div class="card-gtags">${tags}</div>
      </div>`;
    c.onclick=()=>openModal(item);
    grid.appendChild(c);
  });
}

// ── Modal
function openModal(item){
  const mb=document.getElementById('modal-body');
  const isTV=item.is_tv||item.type==='tv';
  const bdH=item.backdrop?`<div class="modal-bd-fade"><img class="modal-bd" src="${item.backdrop}" onerror="this.parentNode.style.display='none'"></div>`:'';
  const posH=item.poster?`<img src="${item.poster}" onerror="this.style.display='none'">`:`<div class="no-p">🎬</div>`;
  const chips=(item.genres||[]).map(g=>`<span class="mchip ac">${g}</span>`).join('');
  const tvChip=isTV?`<span class="mchip tv">📺 TV Series</span>`:'';
  const statsH=`<div class="modal-stats">
    ${item.rating>0?`<div class="mstat"><div class="mstat-lbl">Rating</div><div class="mstat-val">★ ${item.rating}</div></div>`:''}
    ${item.year?`<div class="mstat"><div class="mstat-lbl">Year</div><div class="mstat-val">${item.year}</div></div>`:''}
    ${item.runtime?`<div class="mstat"><div class="mstat-lbl">Runtime</div><div class="mstat-val">${item.runtime}m</div></div>`:''}
    ${item.votes>0?`<div class="mstat"><div class="mstat-lbl">Votes</div><div class="mstat-val">${(item.votes/1000).toFixed(0)}K</div></div>`:''}
  </div>`;
  mb.innerHTML=`${bdH}
    <div class="modal-body">
      <div class="modal-poster">${posH}</div>
      <div>
        <div class="modal-title">${item.title}</div>
        ${item.tagline?`<div class="modal-sub">${item.tagline}</div>`:''}
        ${item.year?`<div class="modal-sub">${item.year}${item.countries&&item.countries.length?' · '+item.countries.join(', '):''}</div>`:''}
        <div class="modal-chips">${tvChip}${chips}</div>
        <div class="modal-desc">${item.overview||'No description available.'}</div>
        ${statsH}
      </div>
    </div>`;
  document.getElementById('overlay').classList.add('open');
}
function closeModal(){document.getElementById('overlay').classList.remove('open')}
function overlayClick(e){if(e.target===document.getElementById('overlay'))closeModal()}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});

// ── Filter bar
function resetFilters(andSearch=true){
  Object.assign(MF,{genres:[],countries:[],ratingMin:null,ratingMax:null,yearFrom:null,yearTo:null,moodPrompt:''});
  document.querySelectorAll('.opt-btn.sel').forEach(b=>b.classList.remove('sel'));
  renderAfBar();
  if(andSearch) clearGrid();
}
function renderAfBar(){
  const bar=document.getElementById('af-bar');
  bar.innerHTML='';
  let any=false;
  const add=(lbl,val,clr)=>{
    any=true;
    const t=document.createElement('div');t.className='af-tag';
    t.innerHTML=`${lbl}: <strong>${val}</strong><button onclick="${clr}">✕</button>`;
    bar.appendChild(t);
  };
  if(MF.genres.length)    add('Genre',   MF.genres.join(', '),    "clearF('genres')");
  if(MF.countries.length) add('Country', MF.countries.join(', '), "clearF('countries')");
  if(MF.ratingMin||MF.ratingMax) add('Rating',`${MF.ratingMin||0}–${MF.ratingMax||10}`,"clearF('rating')");
  if(MF.yearFrom||MF.yearTo)     add('Year',  `${MF.yearFrom||'?'}–${MF.yearTo||'?'}`,  "clearF('year')");
  if(MF.moodPrompt) add('Mood',MF.moodPrompt.slice(0,20)+'…',"clearF('moodPrompt')");
  if(any){const b=document.createElement('button');b.className='clear-all';b.textContent='✕ Clear all';b.onclick=()=>{resetFilters(false);doSearch()};bar.appendChild(b)}
}
function clearF(key){
  if(key==='genres')      MF.genres=[];
  else if(key==='countries') MF.countries=[];
  else if(key==='rating'){MF.ratingMin=null;MF.ratingMax=null;}
  else if(key==='year'){MF.yearFrom=null;MF.yearTo=null;}
  else if(key==='moodPrompt') MF.moodPrompt='';
  renderAfBar(); doSearch();
}

// ── AI Wizard
let awStep=0, awSelected={};

const FLOW = [
  {key:'genres',    q:'Pick genre(s) 🎬',                    opts:['Action','Comedy','Drama','Horror','Sci-Fi','Thriller','Romance','Crime','Mystery','Fantasy','Animation','War','Western','History','Family','Documentary'], multi:true, hasOther:true},
  {key:'countries', q:'Country of origin?',                   opts:['🇺🇸 USA','🇰🇷 Korea','🇯🇵 Japan','🇬🇧 UK','🇫🇷 France','🇩🇪 Germany','🇮🇳 India','🇷🇺 Russia','🇹🇷 Turkey','🇧🇷 Brazil','🇦🇺 Australia','🇨🇳 China'], multi:true, hasOther:true},
  {key:'rating',    q:'Rating range? ★ (1–10)',               opts:[], type:'range2', min:1, max:10, step:0.5},
  {key:'year',      q:'Release year range?',                  opts:[], type:'range2', min:1900, max:2026, step:1},
  {key:'mood',      q:'Describe your mood or occasion 💭\n(e.g. "rainy day", "want to cry", "action evening")', opts:[], type:'text'},
];

const COUNTRY_MAP={
  '🇺🇸 USA':'US','🇰🇷 Korea':'KR','🇯🇵 Japan':'JP','🇬🇧 UK':'GB',
  '🇫🇷 France':'FR','🇩🇪 Germany':'DE','🇮🇳 India':'IN','🇷🇺 Russia':'RU',
  '🇹🇷 Turkey':'TR','🇧🇷 Brazil':'BR','🇦🇺 Australia':'AU','🇨🇳 China':'CN'
};

const INCOMPAT=[
  {countries:['KR'],genres:['western']},
  {countries:['IN'],genres:['western']},
];
function isIncompat(sel){
  const countries=(sel.countries||[]).map(c=>COUNTRY_MAP[c]||c);
  const genres=(sel.genres||[]).map(g=>g.toLowerCase());
  for(const combo of INCOMPAT){
    const cMatch=combo.countries.every(c=>countries.includes(c));
    const gMatch=combo.genres.every(g=>genres.includes(g.toLowerCase()));
    if(cMatch&&gMatch) return true;
  }
  return false;
}

function startChat(afterSearch=false){
  awStep=0; awSelected={};
  document.getElementById('chat-msgs').innerHTML='';
  if(afterSearch){
    addMsg('Results are above! 🎬\nWant to refine? Pick new filters below or search again.',true);
  } else {
    addMsg('Hi! I\'m your movie critic 🎬\nPick filters or type your mood below.',true);
  }
  renderStep();
}

function addMsg(txt,bot=true){
  const box=document.getElementById('chat-msgs');
  const m=document.createElement('div');
  m.className=`msg ${bot?'bot':'user'}`;
  m.innerHTML=txt.replace(/\n/g,'<br>');
  box.appendChild(m);
  box.scrollTop=box.scrollHeight;
}

function renderStep(){
  const box=document.getElementById('chat-opts');
  box.innerHTML='';
  if(awStep>=FLOW.length){
    addMsg('All set! Searching now... 🔎',true);
    applyAndSearch();
    return;
  }
  const s=FLOW[awStep];
  setTimeout(()=>{addMsg(s.q,true);renderStepUI(s);},250);
}

function renderStepUI(s){
  const box=document.getElementById('chat-opts');
  box.innerHTML='';

  if(s.type==='range2'){
    const bl=document.createElement('div');
    bl.className='range-block';
    const isFloat=s.step<1;
    const fmt=v=>isFloat?parseFloat(v).toFixed(1):parseInt(v);
    bl.innerHTML=`<div class="range-inline"><div class="range-side"><label>FROM</label><div class="range-row"><input type="range" id="rs-min" min="${s.min}" max="${s.max}" step="${s.step}" value="${s.min}"><span class="range-val" id="rv-min">${fmt(s.min)}</span></div></div><div class="range-sep">—</div><div class="range-side"><label>TO</label><div class="range-row"><input type="range" id="rs-max" min="${s.min}" max="${s.max}" step="${s.step}" value="${s.max}"><span class="range-val" id="rv-max">${fmt(s.max)}</span></div></div></div>`;
    box.appendChild(bl);
    box.querySelector('#rs-min').oninput=function(){
      let vMin=parseFloat(this.value);
      let vMax=parseFloat(box.querySelector('#rs-max').value);
      if(vMin>vMax){vMax=vMin;box.querySelector('#rs-max').value=vMax;}
      box.querySelector('#rv-min').textContent=fmt(vMin);
      box.querySelector('#rv-max').textContent=fmt(vMax);
    };
    box.querySelector('#rs-max').oninput=function(){
      let vMax=parseFloat(this.value);
      let vMin=parseFloat(box.querySelector('#rs-min').value);
      if(vMax<vMin){vMin=vMax;box.querySelector('#rs-min').value=vMin;}
      box.querySelector('#rv-min').textContent=fmt(vMin);
      box.querySelector('#rv-max').textContent=fmt(vMax);
    };
    awSelected[s.key+'_getter']=()=>({min:parseFloat(box.querySelector('#rs-min').value),max:parseFloat(box.querySelector('#rs-max').value)});
  } else if(s.type==='text'){
    const inp=document.createElement('input');
    inp.className='other-input';
    inp.placeholder='Type here...';
    inp.id='mood-input';
    inp.addEventListener('keydown',e=>{if(e.key==='Enter')goNext();});
    box.appendChild(inp);
  } else if(s.opts&&s.opts.length){
    if(!awSelected[s.key]) awSelected[s.key]=s.multi?[]:'';
    s.opts.forEach(o=>{
      const b=document.createElement('button');
      b.className='opt-btn';
      b.textContent=o;
      const sel=awSelected[s.key];
      if(Array.isArray(sel)?sel.includes(o):sel===o) b.classList.add('sel');
      b.onclick=()=>selectOpt(s,o,b);
      box.appendChild(b);
    });
    if(s.hasOther){
      const inp=document.createElement('input');
      inp.className='other-input';
      inp.placeholder='+ Other (type & press Enter)';
      inp.id='other-inp';
      inp.addEventListener('keydown',e=>{
        if(e.key==='Enter'&&inp.value.trim()){
          const val=inp.value.trim();
          inp.value='';
          selectOpt(s,val,null);
          const nb=document.createElement('button');
          nb.className='opt-btn sel';
          nb.textContent=val;
          nb.onclick=()=>selectOpt(s,val,nb);
          box.insertBefore(nb,inp);
        }
      });
      box.appendChild(inp);
    }
  }

  const next=document.createElement('button');
  next.className='opt-btn next-btn';
  next.textContent='Next →';
  next.onclick=()=>goNext();
  box.appendChild(next);
  const skip=document.createElement('button');
  skip.className='opt-btn skip-btn';
  skip.textContent='⏭ Skip';
  skip.onclick=()=>{awStep++;renderStep();};
  box.appendChild(skip);
}

function selectOpt(s,val,btn){
  if(s.multi){
    if(!Array.isArray(awSelected[s.key])) awSelected[s.key]=[];
    const idx=awSelected[s.key].indexOf(val);
    if(idx>=0){awSelected[s.key].splice(idx,1);if(btn)btn.classList.remove('sel');}
    else{awSelected[s.key].push(val);if(btn)btn.classList.add('sel');}
  } else {
    awSelected[s.key]=awSelected[s.key]===val?'':val;
    document.querySelectorAll('.opt-btn').forEach(b=>{
      if(b.textContent===val)b.classList.toggle('sel',awSelected[s.key]===val);
      else if(s.opts&&s.opts.includes(b.textContent))b.classList.remove('sel');
    });
  }
}

function goNext(){
  const s=FLOW[awStep];
  const key=s?.key;
  let val=awSelected[key];
  if(s?.type==='range2'&&awSelected[key+'_getter']){
    val=awSelected[key+'_getter']();
    awSelected[key]=val;
  }
  if(s?.type==='text'){
    const inp=document.getElementById('mood-input');
    if(inp) val=awSelected[key]=inp.value.trim();
  }
  if(val&&((Array.isArray(val)&&val.length)||(!Array.isArray(val)&&val!==''&&typeof val!=='object'))){
    addMsg(Array.isArray(val)?val.join(', '):(typeof val==='object'?`${val.min}–${val.max}`:val),false);
  } else { addMsg('Skip',false); }
  awStep++;
  renderStep();
}

function applyAndSearch(){
  if(isIncompat(awSelected)){
    addMsg("⚠️ Those filters are incompatible. Showing 0 results.",true);
    renderCards([]);showInfo(0,'titles');return;
  }
  if(awSelected.genres&&awSelected.genres.length)   MF.genres=awSelected.genres.map(g=>g.toLowerCase());
  if(awSelected.countries&&awSelected.countries.length) MF.countries=awSelected.countries.map(c=>COUNTRY_MAP[c]||c);
  if(awSelected.rating){MF.ratingMin=awSelected.rating.min;MF.ratingMax=awSelected.rating.max;}
  if(awSelected.year){MF.yearFrom=awSelected.year.min;MF.yearTo=awSelected.year.max;}
  if(awSelected.mood) MF.moodPrompt=awSelected.mood;
  renderAfBar();

  if(MF.moodPrompt){
    const ctx=`User mood/occasion: "${MF.moodPrompt}". Genres: ${(MF.genres||[]).join(',')||'any'}. Country: ${(MF.countries||[]).join(',')||'any'}. Rating min: ${MF.ratingMin||'any'}. Suggest 3 movie/series titles in bold like **Title Name** that fit perfectly.`;
    addMsg('🤔 Consulting AI about your mood...', true);
    fetch(`${API}/agent`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query:ctx})})
      .then(r=>r.json())
      .then(d=>{
        if(d.answer) addMsg('🎯 '+d.answer,true);
        const titles=(d.answer||'').match(/\*\*([^*]+)\*\*/g);
        if(titles&&titles.length){
          const cleanTitles=titles.map(t=>t.replace(/\*\*/g,'').trim());
          addMsg(`🔍 Showing: ${cleanTitles.join(', ')}`, true);
          Promise.all(cleanTitles.map(t=>
            fetch(`${API}/search`,{method:'POST',headers:{'Content-Type':'application/json'},
              body:JSON.stringify({title_search:true,query:t,limit:5})})
            .then(r=>r.json()).then(d=>d.results||[]).catch(()=>[])
          )).then(arrays=>{
            const seen=new Set(); const combined=[];
            arrays.flat().forEach(m=>{if(!seen.has(m.id)){seen.add(m.id);combined.push(m);}});
            if(combined.length){showLoading(false);renderCards(combined);showInfo(combined.length,'titles');setTimeout(()=>startChat(true),300);}
            else doSearch();
          });
        } else { doSearch(); }
      })
      .catch(()=>{doSearch();});
  } else {
    doSearch();
  }
}

// ── Chat send
function chatSend(){
  const inp=document.getElementById('chat-in');
  const txt=inp.value.trim();
  if(!txt)return;
  inp.value='';
  addMsg(txt,false);
  const ctx=`User says: "${txt}". Help them find a great movie or series. Suggest exactly 3 titles in bold like **Title Name**. Be specific.`;
  addMsg('🤔 Thinking...', true);
  fetch(`${API}/agent`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query:ctx})})
    .then(r=>r.json())
    .then(d=>{
      if(d.answer) addMsg('🎯 '+d.answer,true);
      const titles=(d.answer||'').match(/\*\*([^*]+)\*\*/g);
      if(titles&&titles.length){
        const cleanTitles=titles.map(t=>t.replace(/\*\*/g,'').trim());
        addMsg(`🔍 Showing: ${cleanTitles.join(', ')}`, true);
        Promise.all(cleanTitles.map(t=>
          fetch(`${API}/search`,{method:'POST',headers:{'Content-Type':'application/json'},
            body:JSON.stringify({title_search:true,query:t,limit:5})})
          .then(r=>r.json()).then(d=>d.results||[]).catch(()=>[])
        )).then(arrays=>{
          const seen=new Set(); const combined=[];
          arrays.flat().forEach(m=>{if(!seen.has(m.id)){seen.add(m.id);combined.push(m);}});
          if(combined.length) renderCards(combined);
          else doMovieSearch({title_search:true,query:cleanTitles[0],limit:currentLimit});
        });
      } else {
        doMovieSearch({title_search:false,query:txt,limit:currentLimit});
      }
    })
    .catch(()=>{addMsg('⚠ AI unavailable, searching directly...',true);doMovieSearch({query:txt,limit:currentLimit});});
}
document.getElementById('chat-in').addEventListener('keydown',e=>{if(e.key==='Enter')chatSend()});
document.getElementById('si').addEventListener('keydown',e=>{if(e.key==='Enter')doTitleSearch()});

// ── Init
startChat();
</script>
